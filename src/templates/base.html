<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title or "Flight Advisor" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header>
    <div class="logo">
      <div class="logo-mark">✈</div>
      <div class="logo-name">Flight<span>Advisor</span></div>
    </div>
    <div class="header-search suggestions-host">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="quick-search"
        placeholder="Buscar voo, rota ou aeroporto..."
        onkeydown="if(event.key==='Enter')quickSearch()"
      />
      <div id="quick-search-suggestions" class="suggestions-list"></div>
    </div>
    <div class="header-pills">
      <div class="pill live"><span class="live-dot"></span>OpenSky Live</div>
      <div class="pill" id="api-status-pill">API ●</div>
      <a href="/"            class="{% if active_page == 'dashboard'   %}active{% endif %}">Overview</a>
      <a href="/flight"      class="{% if active_page == 'flight'       %}active{% endif %}">Flights</a>
      <a href="/predictions" class="{% if active_page == 'predictions'  %}active{% endif %}">Predictions</a>
      <a href="/advisor"     class="{% if active_page == 'advisor'      %}active{% endif %}">Advisor</a>
      <a href="/dashboard/"  target="_blank" rel="noreferrer">Analytics</a>
      <a href="/docs/"       target="_blank" rel="noreferrer">Docs</a>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/advisor.js') }}"></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
